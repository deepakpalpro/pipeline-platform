# Local Prometheus scrape config (Compose profile: metrics).
# Scrapes Spring Boot Micrometer at /actuator/prometheus on the host.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: pipeline-api
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          app: pipeline-api
