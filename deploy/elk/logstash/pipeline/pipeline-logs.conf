input {
  # Placeholder for Filebeat / beats input when Kind sidecars are wired.
  # Local Wave 4 smoke uses InMemoryPipelineLogIndexer in pipeline-api.
  beats {
    port => 5044
  }
}

filter {
  if [message] =~ /^\{/ {
    json {
      source => "message"
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "pipeline-logs-%{[tenant_id]}-%{+YYYY.MM.dd}"
  }
}
