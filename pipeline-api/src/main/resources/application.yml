spring:
  application:
    name: pipeline-api
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  structured:
    format:
      console: logstash

pipeline:
  ingress:
    base-url: http://localhost:8080
  webhook:
    queue-trigger:
      enabled: false
      poll-interval-ms: 500
    rate-limit:
      enabled: true
      requests-per-window: 120
      window-seconds: 60
      retry-after-seconds: 60

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  health:
    db:
      enabled: true
    # Lazy AMQP; avoid failing actuator when broker is down during non-messaging ITs.
    rabbit:
      enabled: false
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mysql://localhost:3306/pipeline?allowPublicKeyRetrieval=true&useSSL=false
    username: pipeline
    password: pipeline
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: false
  rabbitmq:
    host: localhost
    port: 5672
    username: pipeline
    password: pipeline

server:
  port: 8080
