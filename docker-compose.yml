# Wave 0 local foundation stack (W0-US01)
# Usage: docker compose up -d && ./scripts/smoke-localstack.sh
# Optional Wave 4 ELK (W4-US04): docker compose --profile elk up -d
# Optional Prometheus + Grafana: docker compose --profile metrics up -d

name: pipeline-platform

services:
  mysql:
    image: mysql:8.4
    container_name: pp-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pipeline
      MYSQL_USER: pipeline
      MYSQL_PASSWORD: pipeline
    volumes:
      - pp-mysql-data:/var/lib/mysql
      # Creates `petstore` DB + grants (runs only on first volume init).
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: pp-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: pipeline
      RABBITMQ_DEFAULT_PASS: pipeline
    volumes:
      - pp-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  localstack:
    image: localstack/localstack:4.3
    container_name: pp-localstack
    ports:
      # Host 4567 avoids clashing with other LocalStack instances that bind 4566.
      # Override with: LOCALSTACK_HOST_PORT=4566 docker compose up -d
      - "${LOCALSTACK_HOST_PORT:-4567}:4566"
    environment:
      SERVICES: s3,sqs
      DEFAULT_REGION: us-east-1
      DEBUG: "0"
    volumes:
      - pp-localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  # Petstore mock API (inventory upload sink for pipelet demos)
  petstore:
    profiles: ["petstore"]
    build:
      context: ./mockservice/petstore
    container_name: pp-petstore
    ports:
      - "4010:4010"
    environment:
      HOST: 0.0.0.0
      PORT: 4010
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: pipeline
      MYSQL_PASSWORD: pipeline
      MYSQL_DATABASE: petstore
      MYSQL_ROOT_USER: root
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4010/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 25s

  # Optional Wave 4 ELK (W4-US04). CI uses InMemoryPipelineLogIndexer; bring this up for manual Kibana.
  elasticsearch:
    profiles: ["elk"]
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: pp-elasticsearch
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - pp-es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s

  kibana:
    profiles: ["elk"]
    image: docker.elastic.co/kibana/kibana:8.15.3
    container_name: pp-kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy

  logstash:
    profiles: ["elk"]
    image: docker.elastic.co/logstash/logstash:8.15.3
    container_name: pp-logstash
    ports:
      - "5044:5044"
    volumes:
      - ./deploy/elk/logstash/pipeline:/usr/share/logstash/pipeline:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      XPACK_MONITORING_ENABLED: "false"

  # Optional metrics stack (W0-US04 scrape + W4 Grafana). API must listen on host :8080.
  prometheus:
    profiles: ["metrics"]
    image: prom/prometheus:v2.55.1
    container_name: pp-prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - pp-prometheus-data:/prometheus
    # Do not pin host.docker.internal to host-gateway (172.17.0.1): on Rancher Desktop
    # that address cannot reach host-published ports. RD/Docker Desktop already inject
    # host.docker.internal (e.g. 192.168.5.2). On Linux Docker Engine only, add:
    #   extra_hosts: ["host.docker.internal:host-gateway"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:9090/-/healthy >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  grafana:
    profiles: ["metrics"]
    image: grafana/grafana:11.3.1
    container_name: pp-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - pp-grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3000/api/health >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  pp-mysql-data:
  pp-rabbitmq-data:
  pp-localstack-data:
  pp-es-data:
  pp-prometheus-data:
  pp-grafana-data:
